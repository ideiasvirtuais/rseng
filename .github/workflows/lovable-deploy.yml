name: "Build e Deploy para stable-website"

on:
  # Aciona o workflow em pushes para a branch 'main'
  push:
    branches:
      - main
  # Permite que você rode este workflow manualmente pela aba Actions
  workflow_dispatch:

# Define permissoes para o GITHUB_TOKEN
# A permissao 'write' e necessaria para fazer push para a branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      # 1. Faz o checkout do codigo do seu repositorio
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4
      
      # 2. Configura o ambiente Node.js
      - name: "Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # 3. Configura o Bun (o projeto usa bun.lock; npm install falha por peer deps)
      - name: "Configurar Bun"
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # 4. Instala as dependencias com bun (lockfile do projeto)
      - name: "Instalar Dependencias"
        run: bun install --frozen-lockfile

      # 5. Roda o build (vite build + postbuild verify-prerender)
      - name: "Rodar Build"
        run: bun run build

      # 6. Localiza o shell SPA do TanStack Start (pode variar entre dist/ e dist/client/)
      - name: "Localizar shell do TanStack Start (SPA mode)"
        id: locate-shell
        run: |
          set -u
          echo "::group::Diagnóstico de saída do build"
          if [ -d dist ]; then
            echo "Conteúdo de dist/:"
            ls -la dist/ || true
          else
            echo "⚠️  Pasta 'dist/' NÃO existe. O comando 'bun run build' pode ter falhado silenciosamente."
          fi
          if [ -d dist/client ]; then
            echo ""
            echo "Conteúdo de dist/client/:"
            ls -la dist/client/ || true
          fi
          echo "::endgroup::"

          if [ -f dist/client/_shell.html ]; then
            echo "✓ Encontrado dist/client/_shell.html — usando este diretório para deploy."
            echo "deploy_dir=dist/client" >> "$GITHUB_OUTPUT"
          elif [ -f dist/_shell.html ]; then
            echo "✓ Encontrado dist/_shell.html — usando este diretório para deploy."
            echo "deploy_dir=dist" >> "$GITHUB_OUTPUT"
          else
            echo ""
            echo "::error title=_shell.html não encontrado::O build terminou mas não gerou o shell SPA do TanStack Start."
            echo ""
            echo "Possíveis causas e correções:"
            echo "  1. SPA mode desligado em vite.config.ts."
            echo "     Confirme o bloco: tanstackStart({ spa: { enabled: true, prerender: { enabled: true } } })"
            echo "  2. O build falhou antes de emitir o cliente."
            echo "     Reveja as linhas acima do step 'Rodar Build' procurando 'error' / 'ELIFECYCLE'."
            echo "  3. Estrutura de saída mudou (ex.: dist/spa ou dist/static)."
            echo "     Rode 'bun run build' localmente e ajuste o caminho neste step."
            echo ""
            echo "Procurando '_shell.html' em qualquer lugar do repo (últimos 20 resultados):"
            find . -name '_shell.html' -not -path './node_modules/*' 2>/dev/null | head -20 || true
            exit 1
          fi

      # 5.05. Validação de artefatos essenciais antes do deploy
      - name: "Validar artefatos do build"
        run: |
          set -u
          DEPLOY_DIR="${{ steps.locate-shell.outputs.deploy_dir }}"
          echo "::group::Validando artefatos em $DEPLOY_DIR"

          if [ -z "$DEPLOY_DIR" ] || [ ! -d "$DEPLOY_DIR" ]; then
            echo "::error title=Diretório de deploy inválido::'$DEPLOY_DIR' não existe ou não foi definido pelo step anterior."
            exit 1
          fi

          missing=0
          check_required() {
            local path="$1"
            local desc="$2"
            if [ ! -e "$DEPLOY_DIR/$path" ]; then
              echo "::error title=Arquivo obrigatório ausente::'$path' não encontrado em $DEPLOY_DIR ($desc)."
              missing=1
            else
              echo "✓ $path ($desc)"
            fi
          }

          check_required "index.html"    "página inicial prerendered"
          check_required "assets"        "bundle JS/CSS gerado pelo Vite"

          if [ -e "$DEPLOY_DIR/_shell.html" ]; then
            if [ -s "$DEPLOY_DIR/_shell.html" ]; then
              echo "✓ _shell.html presente e não-vazio (SPA fallback)"
            else
              echo "::error title=_shell.html vazio::O shell SPA existe mas está vazio — o SPA fallback vai servir uma página em branco."
              missing=1
            fi
          else
            echo "ℹ️  _shell.html não presente — deploy seguirá apenas com páginas prerendered (sem SPA fallback)."
          fi

          # Validação extra: assets/ deve conter pelo menos 1 arquivo JS e 1 CSS
          if [ -d "$DEPLOY_DIR/assets" ]; then
            js_count=$(find "$DEPLOY_DIR/assets" -maxdepth 2 -type f -name '*.js' | wc -l | tr -d ' ')
            css_count=$(find "$DEPLOY_DIR/assets" -maxdepth 2 -type f -name '*.css' | wc -l | tr -d ' ')
            echo "  → assets/: $js_count arquivo(s) .js, $css_count arquivo(s) .css"
            if [ "$js_count" -eq 0 ]; then
              echo "::error title=Nenhum JS em assets/::O build não gerou nenhum bundle JavaScript — algo quebrou no Vite."
              missing=1
            fi
          fi

          # Validação extra: index.html deve referenciar algum bundle de assets/
          if [ -f "$DEPLOY_DIR/index.html" ]; then
            if grep -q 'assets/' "$DEPLOY_DIR/index.html"; then
              echo "✓ index.html referencia bundles em assets/"
            else
              echo "::warning title=index.html sem referência a assets::A página inicial não parece carregar nenhum bundle — verifique se o Vite emitiu links corretos."
            fi
          fi

          echo "::endgroup::"

          if [ "$missing" -ne 0 ]; then
            echo ""
            echo "::error title=Validação falhou::Um ou mais artefatos essenciais estão ausentes. Deploy abortado."
            echo "Conteúdo completo de $DEPLOY_DIR:"
            ls -la "$DEPLOY_DIR" || true
            exit 1
          fi

          echo "✅ Todos os artefatos essenciais estão presentes. Pronto para deploy."

      # 5.1. Gera .htaccess para hospedagens Apache (DirectoryIndex + SPA fallback)
      - name: "Gerar .htaccess para Apache"
        run: |
          cat > "${{ steps.locate-shell.outputs.deploy_dir }}/.htaccess" <<'HTACCESS'
          # TanStack Start SPA (com prerender) hospedado em Apache
          DirectoryIndex index.html _shell.html

          RewriteEngine On

          # SPA fallback: rotas inexistentes caem no _shell.html
          RewriteCond %{REQUEST_FILENAME} !-f
          RewriteCond %{REQUEST_FILENAME} !-d
          RewriteRule ^ _shell.html [L]

          <IfModule mod_headers.c>
            <FilesMatch "_shell\.html$">
              Header set Cache-Control "no-cache, no-store, must-revalidate"
            </FilesMatch>
            <FilesMatch "\.(?:js|css|woff2|woff|svg|png|jpg|jpeg|webp|gif|ico)$">
              Header set Cache-Control "public, max-age=31536000, immutable"
            </FilesMatch>
          </IfModule>

          <IfModule mod_deflate.c>
            AddOutputFilterByType DEFLATE text/html text/css application/javascript application/json image/svg+xml
          </IfModule>
          HTACCESS

      # 6. Faz o deploy do output estatico para a branch 'stable-website'
      - name: "Deploy para a Branch stable-website"
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # O token e injetado automaticamente pelo GitHub
          token: ${{ secrets.GITHUB_TOKEN }}
          # A branch para onde o deploy sera feito
          branch: stable-website
          # O diretorio que sera enviado para a branch (resolvido no step anterior)
          folder: ${{ steps.locate-shell.outputs.deploy_dir }}
          # Opcao para limpar arquivos antigos da branch 'stable-website'
          clean: true